<!DOCTYPE html>
<html>
<head>
<title>India Pandemic Simulator</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: url('AI-Virus-Detection-Concept-777x518.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
    margin: 0;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* HEADER */
.header {
    margin-top: 10px;
}

.score-box {
    font-size: 22px;
    font-weight: bold;
    color: #22c55e;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 15px;
    flex-wrap: wrap;
}

.stats-box {
    padding: 12px 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    font-size: 14px;
}

.info-box {
    padding: 15px;
    width: 280px;
    background: rgba(250,204,21,0.08);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(250,204,21,0.2);
    border-radius: 12px;
    line-height: 1.6;
    text-align: left;
}

.highlight { color: #facc15; font-weight: bold; }
.good { color: #22c55e; }
.bad { color: #ef4444; }

/* CANVAS */
canvas {
    background: rgba(15, 23, 42, 0.65);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
}

/* BUTTONS */
button {
    padding: 8px 14px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: rgba(30,41,59,0.8);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
button:hover {
    background: #334155;
    transform: scale(1.05);
}

select {
    padding: 6px;
    border-radius: 10px;
    background: #1e293b;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="header">
    <h1>🦠 India Pandemic Simulator (Prim's Algorithm)</h1>
    <div class="score-box">Score: <span id="score">100</span></div>
</div>

<div class="dashboard">
    <div class="stats-box" id="stats"></div>
    <div class="info-box" id="info"></div>
</div>

<canvas id="canvas"></canvas>
<div id="buttons"></div>

<button onclick="startGame()">▶ Start</button>
<button onclick="resetGame()">🔄 Reset</button>

<select onchange="changeSpeed(this.value)">
<option value="3000">Slow</option>
<option value="2000">Medium</option>
<option value="1200">Fast</option>
</select>

<script>
const WIDTH = 800, HEIGHT = 500;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function fixCanvas(){
    const ratio = window.devicePixelRatio || 1;
    canvas.width = WIDTH * ratio;
    canvas.height = HEIGHT * ratio;
    canvas.style.width = WIDTH+"px";
    canvas.style.height = HEIGHT+"px";
    ctx.setTransform(ratio,0,0,ratio,0,0);
}
fixCanvas();

/* GRAPH */
const nodes = {
"Gujarat":[100,250],
"Rajasthan":[200,150],
"Delhi":[300,100],
"Uttar Pradesh":[400,150],
"Bihar":[500,150],
"West Bengal":[650,250],
"Madhya Pradesh":[300,250],
"Maharashtra":[300,350],
"Karnataka":[300,420],
"Tamil Nadu":[300,480]
};

const edges = [
["Gujarat","Maharashtra",2],
["Gujarat","Rajasthan",3],
["Gujarat","Madhya Pradesh",3],
["Rajasthan","Delhi",2],
["Rajasthan","Madhya Pradesh",3],
["Delhi","Uttar Pradesh",1],
["Uttar Pradesh","Bihar",2],
["Bihar","West Bengal",2],
["Madhya Pradesh","Maharashtra",2],
["Maharashtra","Karnataka",2],
["Karnataka","Tamil Nadu",2],
["Madhya Pradesh","Uttar Pradesh",3]
];

/* STATE */
let state={}, primNodes=new Set(), primEdges=[];
let score=100, gameOver=false;
let gameInterval, nextTarget=null, candidates=[];
let speed = 2500;
let isAnimating = false;
let canProtect = false;
let gamePhase = "WAITING";
let protectionCount = 0;
let gameStarted = false;

/* PERFORMANCE */
function getEfficiency(){
    let total = Object.keys(state).length;
    let infected = Object.values(state).filter(s=>s=="infected").length;
    let saved = total - infected;
    return ((saved / total) * 100).toFixed(1);
}

function getGrade(){
    let eff = getEfficiency();
    if(eff >= 90) return "🏆 Perfect";
    if(eff >= 75) return "🔥 Excellent";
    if(eff >= 60) return "👍 Good";
    if(eff >= 40) return "⚠️ Average";
    return "❌ Poor";
}

/* START */
function startGame(){
    if(gameStarted) return;
    gameStarted = true;

    gameInterval=setInterval(()=>{
        if(!gameOver && !isAnimating){
            spreadVirus();
        }
    }, speed);
}

/* RESET */
function resetGame(){
    clearInterval(gameInterval);

    state={};
    Object.keys(nodes).forEach(n=>state[n]="safe");

    let start = Object.keys(nodes)[Math.floor(Math.random()*10)];
    state[start]="infected";

    primNodes=new Set([start]);
    primEdges=[];
    score=100;
    protectionCount=0;
    gameOver=false;
    gameStarted=false;

    gamePhase="WAITING";
    nextTarget=null;

    draw();
}

/* DRAW */
function draw(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);

    candidates.forEach(([w,u,v])=>{
        drawLine(nodes[u], nodes[v], "#22c55e",2,false,w);
    });

    edges.forEach(([u,v,w])=>{
        drawLine(nodes[u], nodes[v], "#475569",1,false,w);
    });

    primEdges.forEach(([u,v])=>{
        let e = edges.find(e=>(e[0]==u&&e[1]==v)||(e[0]==v&&e[1]==u));
        drawLine(nodes[u], nodes[v], "orange",4,true,e[2]);
    });

    for(let n in nodes){
        drawNode(nodes[n],state[n],n);
    }

    document.getElementById("score").innerText=score;

    let infected=Object.values(state).filter(s=>s=="infected").length;
    let protectedCount=Object.values(state).filter(s=>s=="protected").length;
    let safe=Object.values(state).filter(s=>s=="safe").length;

    document.getElementById("stats").innerHTML =
    `🟢 Safe: <b>${safe}</b> | 🔵 Protected: <b>${protectedCount}</b> | 🔴 Infected: <b>${infected}</b> | 🛡️ Used: <b>${protectionCount}</b>`;

    document.getElementById("info").innerHTML = `
    <div class="highlight">⚠ Next Infection: ${nextTarget || "-"}</div>
    <div>
    Phase: <b>${gamePhase}</b><br>
    ${gamePhase==="THINKING"
    ? "<span class='good'>🟢 Click now (low cost)</span>"
    : "<span class='bad'>🔴 Late click = high cost</span>"}
    </div>
    <hr>
    <div>
    🎯 Efficiency: <b>${getEfficiency()}%</b><br>
    Performance: <b>${getGrade()}</b>
    </div>
    `;
}

/* NODE */
function drawNode([x,y],status,label){
    let color = status=="infected"?"#ef4444":status=="protected"?"#3b82f6":"#22c55e";

    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(label,x,y-25);
}

/* LINE */
function drawLine([x1,y1],[x2,y2],color,width=2,glow=false,weight=null){
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.strokeStyle=color;
    ctx.lineWidth=width;

    if(glow){
        ctx.shadowColor=color;
        ctx.shadowBlur=10;
    }

    ctx.stroke();
    ctx.shadowBlur=0;

    if(weight){
        ctx.fillStyle="yellow";
        ctx.fillText(weight,(x1+x2)/2,(y1+y2)/2);
    }
}

/* SPREAD */
function spreadVirus(){
    isAnimating=true;
    canProtect=true;
    gamePhase="THINKING";

    candidates=[];

    primNodes.forEach(u=>{
        edges.forEach(([a,b,w])=>{
            let v=null;
            if(a===u) v=b;
            else if(b===u) v=a;

            if(v && !primNodes.has(v) && state[v]!="protected"){
                candidates.push([w,u,v]);
            }
        });
    });

    if(!candidates.length){ isAnimating=false; return; }

    candidates.sort((a,b)=>a[0]-b[0]);
    let [w,u,v]=candidates[0];
    nextTarget=v;

    draw();

    setTimeout(()=>{
        canProtect=false;
        gamePhase="SPREADING";

        primNodes.add(v);
        primEdges.push([u,v]);
        state[v]="infected";
        score-=4;

        draw();
        isAnimating=false;
    },2500);
}

/* ACTION */
function protectNode(n){
    if(gameOver) return;
    if(state[n] !== "safe") return;

    protectionCount++;

    let cost = canProtect
        ? 5 + protectionCount * 3
        : 15 + protectionCount * 5;

    score -= cost;
    state[n] = "protected";

    draw();
}

/* BUTTONS */
function createButtons(){
    let container=document.getElementById("buttons");
    for(let n in nodes){
        let btn=document.createElement("button");
        btn.innerText=n;
        btn.onclick=()=>protectNode(n);
        container.appendChild(btn);
    }
}

function changeSpeed(val){
    speed=parseInt(val);
    resetGame();
}

createButtons();
resetGame();
</script>

</body>
</html>
